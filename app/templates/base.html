<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sentiment Sense{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    {% if request.session.get("admin_id") %}
    {% set path = request.url.path %}
    <nav class="navbar navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="/admin/dashboard">Sentiment Sense</a>
        <div class="d-flex gap-3 align-items-center">
            <a class="nav-link px-2 {% if path.startswith('/admin/dashboard') %}text-white fw-semibold border-bottom border-2 border-primary{% else %}text-light{% endif %}" href="/admin/dashboard">Dashboard</a>
            <a class="nav-link px-2 {% if path.startswith('/admin/employees') %}text-white fw-semibold border-bottom border-2 border-primary{% else %}text-light{% endif %}" href="/admin/employees/upload">Upload</a>
            <a class="nav-link px-2 {% if path.startswith('/admin/surveys') %}text-white fw-semibold border-bottom border-2 border-primary{% else %}text-light{% endif %}" href="/admin/surveys/create">Create Survey</a>
            <form action="/admin/logout" method="post" class="m-0">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </nav>
    {% endif %}

    <main class="container py-4">
        {% for msg in messages %}
        <div class="alert alert-{{ 'danger' if msg.category == 'error' else msg.category }} alert-dismissible fade show auto-dismiss" role="alert">
            {{ msg.message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.alert.auto-dismiss').forEach(el => {
            setTimeout(() => bootstrap.Alert.getOrCreateInstance(el).close(), 10000);
        });
    </script>
</body>
</html>
